<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4338CA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#g)"/>

  <!-- Pin head -->
  <circle cx="50" cy="37" r="19.5" fill="white"/>

  <!-- Pin neck (connects head to tail smoothly) -->
  <ellipse cx="50" cy="51" rx="16" ry="10" fill="white"/>

  <!-- Pin tail -->
  <polygon points="34,51 50,74 66,51" fill="white"/>

  <!-- Inner dot (gradient shows through — hollow pin look) -->
  <circle cx="50" cy="37" r="9" fill="url(#g)"/>
</svg>
